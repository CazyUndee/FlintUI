name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd packages/python && pip install -e .[dev]

      - name: Run tests
        working-directory: packages/python
        run: pytest ../../tests -v

      - name: Install linting tools
        run: |
          pip install black ruff mypy
          cd packages/python && pip install -e .

      - name: Check formatting with Black
        run: black --check packages/python/cronixui tests

      - name: Lint with Ruff
        run: ruff check packages/python/cronixui tests

      - name: Type check with MyPy
        run: mypy packages/python/cronixui

  react-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        working-directory: packages/react
        run: |
          npm ci --legacy-peer-deps || true
          
      - name: Run tests
        working-directory: packages/react
        run: npm test --coverage --watchAll=false
        
      - name: Build package
        working-directory: packages/react
        run: npm run build

  flutter-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        working-directory: packages/flutter
        run: flutter pub get
        
      - name: Analyze code
        working-directory: packages/flutter
        run: |
          flutter analyze --fatal-infos
          dart format --set-exit-if-changed .
        
      - name: Run tests
        working-directory: packages/flutter
        run: flutter test --coverage --reporter=expanded

  go-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Download dependencies
        working-directory: packages/go/cronixui
        run: go mod download
        
      - name: Run tests
        working-directory: packages/go/cronixui
        run: |
          go test -v ./...
          go test -v -race ./...

  rust-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          
      - name: Run tests
        working-directory: packages/rust/cronixui
        run: |
          cargo test --verbose --all
          cargo test --verbose --all --release

  web-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/web/package-lock.json
          
      - name: Install dependencies
        working-directory: packages/web
        run: npm ci
        
      - name: Run tests
        working-directory: packages/web
        run: |
          if [ -f "test/*.js" ]; then
            npm test
          else
            echo "No test files found"
          fi
        
      - name: Build package
        working-directory: packages/web
        run: npm run build

  solid-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/solid/package-lock.json
          
      - name: Install dependencies
        working-directory: packages/solid
        run: npm ci
        
      - name: Run tests
        working-directory: packages/solid
        run: npm test
        
      - name: Build package
        working-directory: packages/solid
        run: npm run build

  svelte-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/svelte/package-lock.json
          
      - name: Install dependencies
        working-directory: packages/svelte
        run: npm ci
        
      - name: Run tests
        working-directory: packages/svelte
        run: npm test
        
      - name: Build package
        working-directory: packages/svelte
        run: npm run build

  vue-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/vue/package-lock.json
          
      - name: Install dependencies
        working-directory: packages/vue
        run: npm ci
        
      - name: Run tests
        working-directory: packages/vue
        run: npm test
        
      - name: Build package
        working-directory: packages/vue
        run: npm run build

  typescript-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/typescript/package-lock.json
          
      - name: Install dependencies
        working-directory: packages/typescript
        run: npm ci
        
      - name: Run tests
        working-directory: packages/typescript
        run: npm test
        
      - name: Type check
        working-directory: packages/typescript
        run: npx tsc --noEmit

  spec-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Validate spec
        working-directory: packages/spec
        run: |
          if [ -f "package.json" ]; then
            npm ci
            npm test || echo "No tests defined for spec package"
          else
            echo "Spec package validation - checking files exist"
            ls -la
          fi

  win-ci:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'
          
      - name: Restore dependencies
        working-directory: packages/win
        run: dotnet restore
        
      - name: Build
        working-directory: packages/win
        run: dotnet build --no-restore
        
      - name: Test
        working-directory: packages/win
        run: dotnet test --no-build --verbosity normal

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [python-ci, react-ci, flutter-ci, go-ci, rust-ci, web-ci, solid-ci, svelte-ci, vue-ci, typescript-ci, spec-ci, win-ci]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        working-directory: packages/python
        run: python -m build

      - name: Check package
        run: twine check packages/python/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
