name: Deploy to Main

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd packages/python && pip install -e .[dev]

      - name: Run tests
        working-directory: packages/python
        run: pytest ../../tests -v

      - name: Install linting tools
        run: |
          pip install black ruff mypy
          cd packages/python && pip install -e .

      - name: Check formatting with Black
        run: black --check packages/python/cronixui tests

      - name: Lint with Ruff
        run: ruff check packages/python/cronixui tests

      - name: Type check with MyPy
        run: mypy packages/python/cronixui

  react-ci:
    uses: ./.github/workflows/react-ci.yml
    secrets: inherit

  flutter-ci:
    uses: ./.github/workflows/flutter-ci.yml
    secrets: inherit

  go-ci:
    uses: ./.github/workflows/go-ci.yml
    secrets: inherit

  rust-ci:
    uses: ./.github/workflows/rust-ci.yml
    secrets: inherit

  web-ci:
    uses: ./.github/workflows/web-ci.yml
    secrets: inherit

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [python-ci, react-ci, flutter-ci, go-ci, rust-ci, web-ci]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        working-directory: packages/python
        run: python -m build

      - name: Check package
        run: twine check packages/python/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
