name: Develop to Main PR

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  check-ci-status:
    runs-on: ubuntu-latest
    outputs:
      ci-success: ${{ steps.check.outputs.success }}
    steps:
      - name: Check CI workflow status
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const checks = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: sha
            });

            const requiredChecks = ['test', 'lint', 'build'];
            let allPassed = true;

            for (const checkName of requiredChecks) {
              const check = checks.data.check_runs.find(c => c.name.includes(checkName));
              if (!check || check.conclusion !== 'success') {
                allPassed = false;
                break;
              }
            }

            core.setOutput('success', allPassed);
            if (!allPassed) {
              core.info('CI checks have not passed yet. Skipping PR creation.');
            }

  open-pr:
    runs-on: ubuntu-latest
    needs: check-ci-status
    if: needs.check-ci-status.outputs.ci-success == 'true'
    steps:
      - name: Ensure PR from develop to main exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const base = "main";
              const head = `${owner}:develop`;

              const existing = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head,
                base,
                per_page: 1
              });

              if (existing.data.length > 0) {
                core.info(`Open PR already exists: #${existing.data[0].number}`);
                return;
              }

              const pr = await github.rest.pulls.create({
                owner,
                repo,
                title: "Promote develop to main",
                head: "develop",
                base,
                body: [
                  "Automated PR from `develop` to `main`.",
                  "",
                  "CI checks have passed on develop branch.",
                  "Please review and merge after verification."
                ].join("\n")
              });

              core.info(`Created PR #${pr.data.number}`);
            } catch (error) {
              if (error.status === 403) {
                core.warning("GitHub Actions cannot create PRs yet. Enable repository setting: Actions > General > Workflow permissions > Allow GitHub Actions to create and approve pull requests.");
                return;
              }
              throw error;
            }
