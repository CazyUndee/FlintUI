name: Python CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/python/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/python/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/python[dev]

      - name: Run tests with pytest
        working-directory: packages/python
        run: |
          pytest ../../tests -v --cov=cronixui --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11' && github.event.repository.private == false
        uses: codecov/codecov-action@v4
        with:
          file: ./packages/python/coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy
          pip install -e packages/python

      - name: Check formatting with Black
        run: black --check packages/python/cronixui tests

      - name: Lint with Ruff
        run: ruff check packages/python/cronixui tests

      - name: Type check with MyPy
        run: mypy packages/python/cronixui

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: packages/python
        run: python -m build

      - name: Check package
        run: |
          pip install twine
          twine check packages/python/dist/*
