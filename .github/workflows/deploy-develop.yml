name: Deploy to Develop

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd packages/python && pip install -e .[dev]

      - name: Run tests
        working-directory: packages/python
        run: pytest ../../tests -v

      - name: Install linting tools
        run: |
          pip install black ruff mypy
          cd packages/python && pip install -e .

      - name: Check formatting with Black
        run: black --check packages/python/cronixui tests

      - name: Lint with Ruff
        run: ruff check packages/python/cronixui tests

      - name: Type check with MyPy
        run: mypy packages/python/cronixui

  react-ci:
    uses: ./.github/workflows/react-ci.yml
    secrets: inherit

  flutter-ci:
    uses: ./.github/workflows/flutter-ci.yml
    secrets: inherit

  go-ci:
    uses: ./.github/workflows/go-ci.yml
    secrets: inherit

  rust-ci:
    uses: ./.github/workflows/rust-ci.yml
    secrets: inherit

  web-ci:
    uses: ./.github/workflows/web-ci.yml
    secrets: inherit

  create-pr:
    runs-on: ubuntu-latest
    needs: [python-ci, react-ci, flutter-ci, go-ci, rust-ci, web-ci]
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Create PR from develop to main
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const base = "main";
              const head = `${owner}:develop`;

              const existing = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head,
                base,
                per_page: 1
              });

              if (existing.data.length > 0) {
                core.info(`Open PR already exists: #${existing.data[0].number}`);
                return;
              }

              const pr = await github.rest.pulls.create({
                owner,
                repo,
                title: "Deploy develop to main",
                head: "develop",
                base,
                body: [
                  "🚀 Ready for deployment to main!",
                  "",
                  "All CI checks have passed on develop branch:",
                  "- ✅ Python tests and linting",
                  "- ✅ React tests and build", 
                  "- ✅ Flutter tests and builds",
                  "- ✅ Go tests and linting",
                  "- ✅ Rust tests and linting",
                  "- ✅ Web tests and build",
                  "",
                  "Please review and merge to deploy to production."
                ].join("\n")
              });

              core.info(`Created deployment PR #${pr.data.number}`);
            } catch (error) {
              if (error.status === 403) {
                core.warning("GitHub Actions cannot create PRs yet. Enable repository setting: Actions > General > Workflow permissions > Allow GitHub Actions to create and approve pull requests.");
                return;
              }
              throw error;
            }
