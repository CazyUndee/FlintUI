[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cronixui"
version = "1.1.3"
description = "CronixUI - A dark-themed UI toolkit with crimson accents and Outfit typography"
readme = "README.md"
license = {file = "LICENSE"}
authors = [{name = "CazyUndee"}]
keywords = ["ui", "dark-mode", "design-system", "components"]
requires-python = ">=3.8"
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Software Development :: User Interfaces",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
  "pytest-cov>=4.0",
  "pytest-asyncio>=0.21",
  "black>=23.0",
  "ruff>=0.1.0",
  "mypy>=1.0",
  "build>=0.10",
  "twine>=4.0",
]

[project.urls]
Repository = "https://github.com/CazyUndee/CronixUI"

[tool.setuptools.packages.find]
where = ["."]
include = ["cronixui*"]

[tool.setuptools]
include-package-data = false

[tool.ruff]
target-version = "py38"
line-length = 100

[tool.ruff.lint]
# Allow List, Dict, etc. for Python 3.8 compatibility
select = ["E", "F", "I", "W"]
ignore = ["UP006", "UP035", "E501"]
