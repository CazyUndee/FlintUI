[package]
name = "cronixui"
version = "1.0.6"
edition = "2021"
description = "CronixUI - A dark-themed UI toolkit with crimson accents and Outfit typography (egui)"
license = "GPL-3.0"
authors = ["CazyUndee"]
keywords = ["ui", "dark-mode", "design-system", "components", "egui"]
repository = "https://github.com/CazyUndee/CronixUI"

[dependencies]
egui = "0.27"

[dev-dependencies]
eframe = "0.27"

[[bin]]
name = "test_runner"
path = "src/tests/lib_tests.rs"
